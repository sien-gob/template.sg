<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log Viewer</title>
    <style>
      :root {
        --background: #1a1a1a;
        --text: #ffffff;
        --primary: #3498db;
        --secondary: #2c3e50;
        --accent: #e74c3c;
        --success: #2ecc71;
        --input-bg: #243447;
        --table-header: #292f33;
        --table-bg: #ffffff;
        --table-text: #000000;
        --table-border: #d0d7de;
        --table-row-hover: #f5f5f5;
        --table-row-alt: #f9f9f9;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background-color: var(--background);
        color: var(--text);
        padding: 2rem;
      }

      .log-viewer {
        max-width: 1200px;
        margin: 0 auto;
      }

      .log-viewer__header {
        margin-bottom: 2rem;
        text-align: center;
      }

      .log-viewer__header h1 {
        font-size: 2.5rem;
        color: var(--text);
      }

      .log-viewer__controls {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin-bottom: 2rem;
        width: 100%;
      }

      .log-viewer__input-container {
        width: 100%;
      }

      .log-viewer__filter-input {
        width: 100%;
        min-height: 220px;
        padding: 1rem;
        border: 1px solid var(--secondary);
        border-radius: 8px;
        background-color: var(--input-bg);
        color: var(--text);
        font-size: 1rem;
        font-family: monospace;
        resize: vertical;
      }

      .log-viewer__buttons {
        display: flex;
        gap: 1rem;
        width: 100%;
      }

      .log-viewer__btn {
        flex: 1;
        padding: 1rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
        transition: opacity 0.2s;
      }

      .log-viewer__btn:hover {
        opacity: 0.9;
      }

      .log-viewer__btn--primary {
        background-color: var(--primary);
        color: var(--text);
      }

      .log-viewer__btn--danger {
        background-color: var(--accent);
        color: var(--text);
      }

      .log-viewer__table-container {
        background-color: var(--table-bg);
        border-radius: 8px;
        padding: 0;
        max-height: 600px; /* Esto controla la altura máxima antes del scroll */
        overflow-y: auto; /* Esto habilita el scroll vertical */
        margin-top: 1rem;
        border: 1px solid var(--table-border);
      }

      .log-viewer__table {
        width: 100%;
        border-collapse: collapse;
        color: var(--table-text);
      }

      .log-viewer__table th {
        background-color: var(--table-header);
        color: white;
        position: sticky;
        top: 0;
        font-weight: 600;
        z-index: 1;
        padding: 1rem;
        text-align: left;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
      }

      .log-viewer__table td {
        padding: 0.75rem 1rem;
        border: 1px solid var(--table-border);
        background-color: var(--table-bg);
      }

      .log-viewer__table tr:nth-child(even) td {
        background-color: var(--table-row-alt);
      }

      .log-viewer__table tr:hover td {
        background-color: var(--table-row-hover);
      }

      .log-viewer__table thead {
        position: sticky;
        top: 0;
        z-index: 2;
      }

      .log-viewer__table th:after {
        content: '';
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        background-color: var(--table-header);
        z-index: -1;
      }

      .log-viewer__notification {
        position: fixed;
        top: 1rem;
        right: 1rem;
        padding: 1rem;
        border-radius: 8px;
        display: none;
        animation: slideIn 0.3s ease-out;
      }

      .log-viewer__notification--success {
        background-color: var(--success);
        color: var(--text);
      }

      .log-viewer__notification--error {
        background-color: var(--accent);
        color: var(--text);
      }

      @keyframes slideIn {
        from {
          transform: translateX(100%);
        }
        to {
          transform: translateX(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="log-viewer">
      <div class="log-viewer__header">
        <h1>Log Viewer</h1>
      </div>

      <div class="log-viewer__controls">
        <div class="log-viewer__input-container">
          <textarea
            id="filterInput"
            class="log-viewer__filter-input"
            placeholder='Ingrese filtro JSON (ej: 
                Ejemplo 1:
                {
                  "filter": { 
                      "level": "ERROR"
                  }
                } 

                Ejemplo 2:
                {
                  "filter": {
                    "created_at": { "operator": "BETWEEN", "value": ["2024-01-01", "2024-01-31"] },
                    "status": { "operator": "<>", "value": "deleted" }
                  }
                } 

                Ejemplo 3:  
                {
                  "filter":  {
                      "AND": [
                        { "status": "active" },
                        {
                          "OR": [
                            { "role": "admin" },
                            { "level": { "operator": ">=", "value": 5 } }
                          ]
                        }
                      ]
                    }
                } 

                Ejemplo 4:
                {
                  "filter": {
                    "status": {"operator": "IN", "value": ["active", "pending"] },
                  } 
                }                 

                Ejemplo 5:
                { 
                  "filter": {
                    "OR": [
                      {
                        "AND": [
                          { "level": 1 }
                        ]
                      },
                      {
                        "AND": [
                          { "level": "ERROR" },
                          { "message": { "operator": "LIKE", "value": "%Proceso%"} }
                        ]
                      }
                    ]
                  }
                }
            )'
          ></textarea>
        </div>
        <div class="log-viewer__buttons">
          <button id="searchBtn" class="log-viewer__btn log-viewer__btn--primary">Consultar</button>
          <button id="clearBtn" class="log-viewer__btn log-viewer__btn--danger">Limpiar</button>
        </div>
      </div>

      <div class="log-viewer__table-container">
        <table id="logsTable" class="log-viewer__table">
          <thead>
            <tr>
              <th>id</th>
              <th>level</th>
              <th>source</th>
              <th>message</th>
              <th>metadata</th>
              <th>created_at</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div id="notification" class="log-viewer__notification"></div>

    <script>
      class NotificationManager {
        constructor() {
          this.notification = document.getElementById('notification');
          this.timeout = null;
        }

        show(message, type = 'success') {
          clearTimeout(this.timeout);
          this.notification.textContent = message;
          this.notification.className = `log-viewer__notification log-viewer__notification--${type}`;
          this.notification.style.display = 'block';

          this.timeout = setTimeout(() => {
            this.notification.style.display = 'none';
          }, 3000);
        }
      }

      class LogManager {
        constructor(tableId, notificationManager) {
          this.table = document.getElementById(tableId);
          this.notifications = notificationManager;
          this.baseUrl = 'http://localhost:4001/template/syslog';
        }

        async fetchLogs(filter = {}) {
          try {
            const response = await fetch(`${this.baseUrl}/report`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ filter }),
            });

            if (!response.ok) {
              throw new Error('Error al cargar los logs');
            }

            const res = await response.text();
            return JSON.parse(res).data;
          } catch (error) {
            throw new Error('Error al obtener los logs: ' + error.message);
          }
        }

        async clearLogs(filter = {}) {
          try {
            const response = await fetch(`${this.baseUrl}/clear`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ filter }),
            });

            if (!response.ok) {
              throw new Error('Error al limpiar los logs');
            }

            return await response.json();
          } catch (error) {
            throw new Error('Error al limpiar los logs: ' + error.message);
          }
        }

        updateTable(logs) {
          const tbody = this.table.querySelector('tbody');
          tbody.innerHTML = '';

          logs.forEach((log) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                        <td>${log.id}</td>
                        <td>${log.level}</td>
                        <td>${log.source}</td>
                        <td>${log.message}</td>
                        <td>${typeof log.metadata === 'object' ? JSON.stringify(log.metadata) : log.metadata}</td>
                        <td>${log.createdAt}</td>
                    `;
            tbody.appendChild(row);
          });
        }
      }

      document.addEventListener('DOMContentLoaded', () => {
        const notificationManager = new NotificationManager();
        const logManager = new LogManager('logsTable', notificationManager);
        const filterInput = document.getElementById('filterInput');
        const searchBtn = document.getElementById('searchBtn');
        const clearBtn = document.getElementById('clearBtn');

        const parseFilter = () => {
          try {
            return filterInput.value ? JSON.parse(filterInput.value) : {};
          } catch (error) {
            throw new Error('Filtro JSON inválido');
          }
        };

        logManager
          .fetchLogs()
          .then((logs) => logManager.updateTable(logs))
          .catch((error) => notificationManager.show(error.message, 'error'));

        searchBtn.addEventListener('click', async () => {
          try {
            const filter = parseFilter();
            const logs = await logManager.fetchLogs(filter);
            logManager.updateTable(logs);
            notificationManager.show('Logs actualizados exitosamente');
          } catch (error) {
            notificationManager.show(error.message, 'error');
          }
        });

        clearBtn.addEventListener('click', async () => {
          try {
            const filter = parseFilter();
            await logManager.clearLogs(filter);
            const logs = await logManager.fetchLogs({});
            logManager.updateTable(logs);
            notificationManager.show('Logs limpiados exitosamente');
          } catch (error) {
            notificationManager.show(error.message, 'error');
          }
        });

        filterInput.addEventListener('keydown', (e) => {
          if (e.ctrlKey && e.key === 'Enter') {
            searchBtn.click();
          }
        });
      });
    </script>
  </body>
</html>
